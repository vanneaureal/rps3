{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="hero">
    <h1>📝 Регистрация</h1>
</div>
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <form method="POST">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" required class="form-control">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required class="form-control">
        </div>
        <button type="submit" class="btn btn-success" style="width:100%">Зарегистрироваться</button>
    </form>
    <p style="text-align:center; margin-top:1rem">
        Есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
    </p>
</div>

<style>
.form-group { margin-bottom: 1rem; }
.form-control {
    width: 100%; padding: 12px; border: 2px solid #e9ecef;
    border-radius: 8px; font-size: 16px;
}
.form-control:focus { border-color: #007bff; outline: none; }
</style>
{% endblock %}
